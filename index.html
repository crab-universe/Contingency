<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CoNtInGeNcY PlAnS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff00">

<style>
* { box-sizing: border-box; }
body{ font-family: Courier, monospace; background:#0f0f0f; color:#00ff00; display:flex; flex-direction:column; align-items:center; margin:0; padding:10px; min-height:100vh; }
header{ width:100%; text-align:center; font-size:22px; background:#000; padding:14px; border-bottom:1px solid #00ff00; text-shadow:0 0 5px #00ff00; }
.container{ width:100%; max-width:600px; display:flex; flex-direction:column; align-items:center; margin-top:10px; }
input, textarea, select{ width:100%; padding:12px; font-size:16px; border-radius:6px; border:1px solid #00ff00; background:#000; color:#00ff00; font-family:Courier, monospace; margin:6px 0; }
textarea{ min-height:90px; resize:vertical; }
button{ width:100%; padding:12px; font-size:16px; border:none; border-radius:6px; background:#000; color:#00ff00; cursor:pointer; margin:6px 0; box-shadow:0 0 5px #00ff00; }
button:active{ background:#111; }
.deleteBtn{background:#550000; color:#ff5555;}
.lockBtn{background:#330033; color:#ff55ff;}
.topControls{ width:100%; display:flex; flex-direction:column; }
#folders{ width:100%; }
.folder{ width:100%; background:#000; border:1px solid #00ff00; border-radius:8px; margin-top:15px; box-shadow:0 0 8px #00ff00; padding:8px; }
.folderHeader{ padding:12px; font-size:16px; display:flex; justify-content:space-between; align-items:center; background:#111; border-radius:6px; cursor:pointer; }
.entry{ padding:10px; border-top:1px solid #00ff00; }
.entry .title{ font-size:16px; cursor:pointer; }
.meta{ font-size:12px; margin-top:6px; }
.locked{ color:#ff00ff; font-weight:bold; }
.hidden{ display:none; }
.dragging{ opacity:0.5; border:1px dashed #00ff00; }

/* Mobile tweaks */
@media (max-width: 480px){
  header{ font-size:18px; padding:10px; }
  button{ padding:14px; }
  input, textarea{ font-size:16px; }
}
</style>
</head>
<body>
<header>Contingency Plans</header>

<div id="login" class="container">
<h3>Login</h3>
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:#ff5555;"></p>
</div>

<div id="app" class="container" style="display:none;">
<div class="topControls">
<input id="search" placeholder="Search..." onkeyup="displayFolders()">
<input id="newFolderName" placeholder="New Folder">
<button onclick="addFolder()">Create Folder</button>
<input id="newTitle" placeholder="Entry Title">
<textarea id="newContent" placeholder="Entry details"></textarea>
<select id="folderSelect"></select>
<button onclick="addEntry()">Add Entry</button>
<input type="password" id="masterPassword" placeholder="Master Password">
<button onclick="unlockAll()">Unlock All Entries</button>
</div>
<div id="folders"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// 🔹 Replace with your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBDXNJzxXzBOP-TxuUh3ZZx-i8qbteo1gU",
  authDomain: "contingency-941c1.firebaseapp.com",
  projectId: "contingency-941c1",
  storageBucket: "contingency-941c1.firebasestorage.app",
  messagingSenderId: "403257272262",
  appId: "1:403257272262:web:fa5a23e06e4046376a34c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const foldersDoc = doc(db, "folders", "main");

// 🔹 Ensure document exists
async function ensureDocExists() {
  const snap = await getDoc(foldersDoc);
  if(!snap.exists()){
    await setDoc(foldersDoc, { folders: [] });
    console.log("Firestore document created");
  }
}
await ensureDocExists();

// 🔹 Real-time sync
onSnapshot(foldersDoc, snap=>{
  if(snap.exists()){
    const data = snap.data();
    localStorage.setItem("notesData", JSON.stringify(data));
    if(document.getElementById("login").style.display === "none"){
      displayFolders();
    }
  }
});

// 🔹 Local storage helper
function getData(){ return JSON.parse(localStorage.getItem("notesData")) || { folders: [] }; }

// 🔹 Save data to Firebase
window.saveData = async function(data){
  localStorage.setItem("notesData", JSON.stringify(data));
  await setDoc(foldersDoc, data, { merge: true });
}

// ===== LOGIN =====
const PASSWORD = "1379";
const MASTER_PASSWORD = "hewwo";
window.login = function(){
  let pass = document.getElementById("password").value.trim();
  let errorMsg = document.getElementById("error");
  if(pass === PASSWORD) or (pass === MASTER_PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    errorMsg.innerText="";
    displayFolders();
  } else errorMsg.innerText="Incorrect password";
}

// ===== FOLDERS =====
window.addFolder = async function(){
  const data = getData();
  const name = document.getElementById("newFolderName").value.trim();
  if(!name) return alert("Folder name cannot be empty!");
  data.folders.push({ name, open:true, entries:[] });
  document.getElementById("newFolderName").value="";
  await saveData(data);
  displayFolders();
}

window.deleteFolder = async function(i){
  if(!confirm("Delete folder and all entries?")) return;
  const data = getData();
  data.folders.splice(i,1);
  await saveData(data);
  displayFolders();
}

window.toggleFolder = async function(i){
  const data = getData();
  data.folders[i].open = !data.folders[i].open;
  await saveData(data);
  displayFolders();
}

// ===== ENTRIES =====
window.addEntry = async function(){
  const data = getData();
  const title = document.getElementById("newTitle").value;
  const content = document.getElementById("newContent").value;
  const folderIndex = document.getElementById("folderSelect").value;
  if(folderIndex === "") return alert("Select a folder!");
  data.folders[folderIndex].entries.push({title, content, open:false, date:new Date().toLocaleString(), locked:false, password:""});
  document.getElementById("newTitle").value="";
  document.getElementById("newContent").value="";
  await saveData(data);
  displayFolders();
}

window.toggleEntry = async function(fi,ei){
  const data = getData();
  data.folders[fi].entries[ei].open = !data.folders[fi].entries[ei].open;
  await saveData(data);
  displayFolders();
}

window.deleteEntry = async function(fi,ei){
  const data = getData();
  data.folders[fi].entries.splice(ei,1);
  await saveData(data);
  displayFolders();
}

// ===== LOCK =====
window.lockEntry = async function(fi,ei){
  const data = getData();
  let pass = prompt("Set password for this entry");
  if(!pass) return;
  data.folders[fi].entries[ei].locked = true;
  data.folders[fi].entries[ei].password = pass;
  await saveData(data);
  displayFolders();
}

window.unlockEntry = async function(fi,ei){
  const data = getData();
  let entry = data.folders[fi].entries[ei];
  let pass = prompt("Enter entry password");
  if(pass === entry.password){
    entry.locked = false;
    await saveData(data);
    displayFolders();
  } else alert("Incorrect password");
}

window.unlockAll = async function(){
  let pass = document.getElementById("masterPassword").value;
  if(pass !== MASTER_PASSWORD){ alert("Incorrect master password"); return; }
  const data = getData();
  data.folders.forEach(f => f.entries.forEach(e => e.locked = false));
  await saveData(data);
  displayFolders();
}

// ===== EDIT =====
window.editTitle = async function(fi,ei,value){
  const data = getData();
  data.folders[fi].entries[ei].title = value;
  await saveData(data);
  displayFolders();
}

window.editContent = async function(fi,ei,value){
  const data = getData();
  data.folders[fi].entries[ei].content = value;
  await saveData(data);
  displayFolders();
}

// ===== DISPLAY =====
let draggedFolderIndex=null, draggedEntry=null;
window.displayFolders = function(){
  const data = getData();
  const search = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("folders");
  container.innerHTML="";
  const select = document.getElementById("folderSelect");
  select.innerHTML="";
  
  data.folders.forEach((folder,fi)=>{
    select.innerHTML+=`<option value="${fi}">${folder.name}</option>`;
    const folderDiv = document.createElement("div");
    folderDiv.className="folder";
    folderDiv.setAttribute("draggable","true");
    folderDiv.dataset.index = fi;

    folderDiv.innerHTML = `<div class="folderHeader" onclick="toggleFolder(${fi})">
      <span>📂 ${folder.name}</span>
      <button class="deleteBtn" onclick="event.stopPropagation();deleteFolder(${fi})">Delete</button>
    </div>
    <div class="${folder.open?'':'hidden'}"></div>`;

    const entriesContainer = folderDiv.querySelector("div:last-child");
    folder.entries.forEach((entry,ei)=>{
      if((entry.title||"").toLowerCase().includes(search) || (entry.content||"").toLowerCase().includes(search)){
        const entryDiv = document.createElement("div");
        entryDiv.className="entry";
        entryDiv.dataset.folderIndex = fi;
        entryDiv.dataset.entryIndex = ei;

        let innerHTML = `<input class="title" value="${entry.title}" onclick="toggleEntry(${fi},${ei})" onchange="editTitle(${fi},${ei},this.value)">`;

        if(entry.locked){
          innerHTML += `<div class="locked">🔒 Locked Entry</div>
          <button class="lockBtn" onclick="unlockEntry(${fi},${ei})">Unlock</button>`;
        } else {
          innerHTML += `<div class="${entry.open?'':'hidden'}">
            <textarea onchange="editContent(${fi},${ei},this.value)">${entry.content}</textarea>
            <div class="meta">Created: ${entry.date}</div>
            <button class="lockBtn" onclick="lockEntry(${fi},${ei})">Lock</button>
            <button class="deleteBtn" onclick="deleteEntry(${fi},${ei})">Delete</button>
          </div>`;
        }

        entryDiv.innerHTML = innerHTML;
        entriesContainer.appendChild(entryDiv);
      }
    });

    container.appendChild(folderDiv);
  });
}
</script>
</body>
</html>
